name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ vars.SITE_URL }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Security Audit
        run: pnpm audit --prod --audit-level=high

      - name: ESLint
        run: pnpm lint

      - name: Astro Check
        run: npx astro check

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: atomic_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL_LOCAL: postgresql://test:test@localhost:5432/atomic_test
      DB_ENV: LOCAL
      NODE_ENV: test
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
      SITE_URL: ${{ vars.SITE_URL }}
      SMTP_PROVIDER: NODEMAILER
      SMTP_FROM_EMAIL: ci@test.local
      SMTP_HOST: localhost
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Migrations
        run: pnpm db:migrate

      - name: Vitest
        run: pnpm test -- --coverage

      - name: Generate Vitest Report
        if: ${{ !cancelled() }}
        run: pnpm test:report

      - name: Upload Vitest Report
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: vitest-report
          path: tests/reports/vitest-*
          retention-days: 7

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint-and-check, unit-tests]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: atomic_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL_LOCAL: postgresql://test:test@localhost:5432/atomic_e2e
      DB_ENV: LOCAL
      NODE_ENV: test
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
      SITE_URL: ${{ vars.SITE_URL }}
      SMTP_PROVIDER: NODEMAILER
      SMTP_FROM_EMAIL: ci@test.local
      SMTP_HOST: localhost
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Migrations
        run: pnpm db:migrate

      - name: Build
        run: pnpm build

      - name: Run E2E Tests
        run: pnpm test:e2e

      - name: Generate Playwright Report
        if: ${{ !cancelled() }}
        run: pnpm test:e2e:report

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: tests/reports/playwright/
          retention-days: 7

  a11y-perf:
    name: Accessibility & Performance
    runs-on: ubuntu-latest
    needs: [lint-and-check]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: atomic_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL_LOCAL: postgresql://test:test@localhost:5432/atomic_test
      DB_ENV: LOCAL
      NODE_ENV: test
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: http://localhost:4321
      SITE_URL: ${{ vars.SITE_URL }}
      SMTP_PROVIDER: NODEMAILER
      SMTP_FROM_EMAIL: ci@test.local
      SMTP_HOST: localhost
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Chrome
        run: npx playwright install --with-deps chromium

      - name: Run Migrations
        run: pnpm db:migrate

      - name: Build
        run: pnpm build

      - name: Start Preview Server
        run: pnpm preview &

      - name: Wait for Server
        run: npx wait-on http://localhost:4321 --timeout 30000

      - name: Setup A11y Seed Users
        run: pnpm a11y:setup

      - name: Pa11y-ci (WCAG AAA)
        run: pnpm a11y:pa11y

      - name: Lighthouse CI (Public Pages)
        run: pnpm a11y:lighthouse

      - name: Rename Lighthouse Reports (Public)
        if: ${{ !cancelled() }}
        run: pnpm a11y:lighthouse:rename

      - name: Lighthouse CI (Authenticated Pages)
        run: pnpm a11y:lighthouse:authed

      - name: Rename Lighthouse Reports (Authenticated)
        if: ${{ !cancelled() }}
        run: pnpm a11y:lighthouse:rename

      - name: Teardown A11y Seed Users
        if: always()
        run: pnpm a11y:teardown

      - name: Upload Lighthouse Reports
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 7

      - name: Upload A11y Reports
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: a11y-reports
          path: tests/reports/
          retention-days: 7
